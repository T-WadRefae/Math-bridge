<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>اختبار البداية السحري | جسر الرياضيات 🔮</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { display:['"Baloo Bhaijaan 2"','sans-serif'], body:['Tajawal','sans-serif'] },
    colors: {
      grape:{100:'#efe7ff',300:'#c5a8ff',400:'#a880ff',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9'},
      coral:{100:'#ffe4e0',300:'#ffab9e',500:'#ff6b5e',600:'#f0473a'},
      sunny:{100:'#fff3cc',300:'#ffd95e',400:'#ffce2e',500:'#ffb800'},
      mint:{100:'#d2fff0',300:'#7ff0cb',500:'#1fd9a3',600:'#0fb98a',700:'#0a9b73'},
      sky:{100:'#d9f0ff',300:'#8ad6ff',500:'#22b0ff',600:'#0090e6'},
      bubble:{100:'#ffe0f4',300:'#ff9ed8',500:'#ff4fb8',600:'#ed2aa0'},
    },
    boxShadow:{ pop:'0 6px 0 0 rgba(0,0,0,.16)', card:'0 12px 0 -4px rgba(0,0,0,.06),0 24px 48px -20px rgba(0,0,0,.18)', bubbly:'0 18px 50px -12px rgba(124,58,237,.35)' },
    keyframes:{
      bob:{'0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-12px)'}},
      wobble:{'0%,100%':{transform:'rotate(-5deg)'},'50%':{transform:'rotate(5deg)'}},
      pop:{'0%':{transform:'scale(0)',opacity:'0'},'70%':{transform:'scale(1.12)'},'100%':{transform:'scale(1)',opacity:'1'}},
      slideUp:{'0%':{transform:'translateY(30px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},
      shake:{'10%,90%':{transform:'translateX(-2px)'},'20%,80%':{transform:'translateX(4px)'},'30%,50%,70%':{transform:'translateX(-7px)'},'40%,60%':{transform:'translateX(7px)'}},
    },
    animation:{ bob:'bob 4s ease-in-out infinite', wobble:'wobble 3s ease-in-out infinite', pop:'pop .5s cubic-bezier(.34,1.56,.64,1) both', slideUp:'slideUp .6s cubic-bezier(.16,.84,.44,1) both', shake:'shake .5s' },
  }},
};
</script>
<style>
  body{font-family:'Tajawal',sans-serif; background:#fff9ef;}
  .font-display{font-family:'Baloo Bhaijaan 2',sans-serif;}
  ::selection{background:#ffd95e;color:#6d28d9;}
  .sky-bg{background:radial-gradient(circle at 15% 15%,#ffe0f4 0,transparent 30%),radial-gradient(circle at 85% 12%,#d9f0ff 0,transparent 32%),radial-gradient(circle at 75% 85%,#d2fff0 0,transparent 34%),#fff9ef;}
  .dotty{background-image:radial-gradient(rgba(124,58,237,.10) 2px,transparent 2px);background-size:26px 26px;}
  .btn-pop{box-shadow:0 6px 0 0 rgba(0,0,0,.16); transition:transform .12s, box-shadow .12s;}
  .btn-pop:active{transform:translateY(5px); box-shadow:0 1px 0 0 rgba(0,0,0,.16);}
  .btn-pop:hover{transform:translateY(-2px); box-shadow:0 9px 0 0 rgba(0,0,0,.16);}
  .blob{position:absolute;border-radius:42% 58% 63% 37%/41% 44% 56% 59%;filter:blur(3px);opacity:.45;}
  .confetti{position:fixed;width:12px;height:14px;top:-20px;z-index:9999;pointer-events:none;border-radius:3px;}
  .frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;margin:0 .15em;}
  .frac .num{padding:0 .35em;}
  .frac .den{padding:.06em .35em 0;border-top:.16em solid currentColor;}
</style>
</head>

<body class="sky-bg text-grape-700 min-h-screen overflow-x-hidden">

<header class="px-3 sm:px-5 pt-3 sticky top-0 z-40">
  <div class="mx-auto max-w-3xl rounded-[1.4rem] bg-white/90 backdrop-blur border-4 border-white shadow-card px-4 py-3">
    <div class="flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid place-items-center w-10 h-10 rounded-2xl bg-gradient-to-br from-grape-500 to-bubble-500 text-white animate-wobble">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17c3-5 6-5 9 0s6 5 9 0"/><path d="M3 17v3M21 17v3"/></svg>
        </span>
        <span class="font-display text-lg font-extrabold text-grape-700">جسر الرياضيات</span>
      </a>
      <a href="index.html" class="font-display text-sm font-bold text-grape-400 hover:text-coral-500 transition">✕ خروج</a>
    </div>
    <div id="progress" class="mt-3 hidden">
      <div class="flex items-center justify-between font-display font-bold text-grape-500 text-xs mb-1.5">
        <span id="progLabel">السؤال ١</span>
        <span id="worldLabel"></span>
      </div>
      <div class="h-2.5 rounded-full bg-grape-100 overflow-hidden"><div id="progBar" class="h-full rounded-full bg-gradient-to-l from-mint-500 to-sky-500 transition-all duration-500" style="width:0%"></div></div>
    </div>
  </div>
</header>

<main class="relative px-4 sm:px-6 py-8">
  <div class="blob w-60 h-60 bg-sunny-300 top-20 -right-12 animate-bob"></div>
  <div class="blob w-52 h-52 bg-mint-300 bottom-10 -left-10 animate-bob"></div>
  <div id="stage" class="relative mx-auto max-w-3xl"></div>
</main>

<script src="curriculum.js"></script>
<script>
const stage = document.getElementById('stage');
const toAr = window.MB.toAr;
const fx   = window.MB.frac;   // يحوّل رموز {{n/d}} إلى كسور

function confetti(big){
  const cols=['#ffb800','#ff4fb8','#1fd9a3','#22b0ff','#8b5cf6','#ff6b5e'];
  for(let i=0;i<(big?70:30);i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length];
    const dur=1.6+Math.random()*1.3;
    c.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY(105vh) rotate('+(720*Math.random())+'deg)',opacity:.9}],{duration:dur*1000,easing:'cubic-bezier(.2,.6,.4,1)'});
    document.body.appendChild(c); setTimeout(function(){c.remove();},dur*1000);
  }
}

/* ============ الحالة ============ */
let GRADE = 5;
let QUIZ = [];          // مصفوفة مهارات (كائنات من SKILLS)
let qIdx = 0, answered = false;
let result = {};        // { world: {correct,total,gaps:{}} }

/* ============ شاشة الترحيب + اختيار الصف ============ */
function screenWelcome(){
  document.getElementById('progress').classList.add('hidden');
  const cur = window.MB.currentStudent();
  const banner = cur
    ? '<div class="mb-5 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-mint-100 text-mint-700 font-display font-bold text-sm">🦊 مرحباً '+cur.name+'! تقدّمك يُحفظ في رحلتك.</div>'
    : '<div class="mb-5 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-sunny-100 text-grape-600 font-display font-bold text-sm">👋 تلعب كضيف — <a href="student.html" class="underline">سجّل الدخول</a> لحفظ تقدّمك.</div>';
  const gradeBtns = window.GRADES.map(function(g){
    return '<button onclick="startQuiz('+g+')" class="font-display grid place-items-center gap-1 py-5 rounded-3xl bg-white border-4 border-white shadow-card btn-pop">'+
      '<span class="text-3xl font-extrabold text-grape-600">'+toAr(g)+'</span>'+
      '<span class="text-xs font-bold text-grape-400">الصف</span></button>';
  }).join('');
  stage.innerHTML =
    '<div class="text-center animate-pop">'+
      banner+
      '<div class="mx-auto w-32 h-32 grid place-items-center rounded-[2rem] bg-gradient-to-br from-sunny-300 to-coral-500 text-7xl shadow-bubbly animate-bob">🔮</div>'+
      '<h1 class="font-display mt-6 text-4xl sm:text-5xl font-extrabold text-grape-700">اختبار البداية السحري!</h1>'+
      '<p class="mt-3 text-lg text-grape-600/85 font-medium max-w-xl mx-auto">مرحباً أيها البطل! 👋 اختر <b class="text-bubble-500">صفّك</b> ونرسم لك خريطة مهاراتك عبر عوالم الرياضيات.<br/>كل إجابة — حتى الخاطئة — <b class="text-mint-600">ترسم لك خريطتك السحرية!</b></p>'+
      '<div class="mt-8 grid grid-cols-5 gap-2 sm:gap-4 max-w-xl mx-auto">'+gradeBtns+'</div>'+
      '<p class="mt-6 text-sm font-bold text-grape-400">اختبار قصير متوازن عبر العوالم — حسب صفّك</p>'+
    '</div>';
}

function startQuiz(grade){
  GRADE = grade;
  QUIZ = window.MB.selectDiagnostic(grade, 8);
  qIdx = 0;
  result = {};
  QUIZ.forEach(function(s){ if(!result[s.world]) result[s.world]={correct:0,total:0,gaps:{}}; });
  screenQuestion();
}

function updateProgress(){
  document.getElementById('progress').classList.remove('hidden');
  const pct = Math.round((qIdx)/QUIZ.length*100);
  document.getElementById('progBar').style.width = pct+'%';
  document.getElementById('progLabel').textContent = 'السؤال '+toAr(qIdx+1)+' من '+toAr(QUIZ.length);
  const w = window.WORLDS[QUIZ[qIdx].world];
  document.getElementById('worldLabel').textContent = w.emoji+' '+w.name;
}

/* ============ شاشة السؤال ============ */
function screenQuestion(){
  answered=false; updateProgress();
  const s = QUIZ[qIdx], q = s.q, w = window.WORLDS[s.world];
  const arLetters = ['أ','ب','ج','د'];
  let opts='';
  for(let i=0;i<q.options.length;i++){
    opts += '<button data-i="'+i+'" onclick="choose('+i+')" class="opt group font-display flex items-center justify-between gap-3 w-full px-6 py-5 rounded-3xl bg-white border-4 border-grape-100 shadow-pop btn-pop text-2xl font-extrabold text-grape-700">'+
      '<span class="grid place-items-center w-10 h-10 rounded-2xl bg-grape-100 text-grape-500 text-base shrink-0">'+arLetters[i]+'</span>'+
      '<span class="flex-1 text-center">'+fx(q.options[i].label)+'</span>'+
      '<span class="w-10"></span></button>';
  }
  stage.innerHTML =
    '<div class="animate-slideUp">'+
      '<div class="rounded-[2.5rem] bg-white border-[6px] border-white shadow-card p-7 sm:p-9 text-center relative overflow-hidden">'+
        '<span class="inline-block px-4 py-1.5 rounded-full '+w.soft+' '+w.text+' font-display font-bold text-sm">'+w.emoji+' '+w.name+' · '+s.name+'</span>'+
        '<div class="font-display mt-5 text-3xl sm:text-4xl font-extrabold text-grape-700 flex items-center justify-center flex-wrap gap-1">'+fx(q.promptHTML)+'</div>'+
        '<p class="mt-4 text-grape-500 font-medium">'+fx(q.hint)+'</p>'+
      '</div>'+
      '<div class="mt-5 grid sm:grid-cols-2 gap-4">'+opts+'</div>'+
      '<div id="feedback" class="mt-5"></div>'+
    '</div>';
}

function choose(i){
  if(answered) return; answered=true;
  const s = QUIZ[qIdx], q = s.q, o = q.options[i];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(function(b){b.classList.add('pointer-events-none');});
  result[s.world].total++;
  if(o.ok){
    result[s.world].correct++;
    window.MB.recordDiag(GRADE, s.id, 'ok');
    buttons[i].classList.remove('border-grape-100'); buttons[i].classList.add('!border-mint-500','bg-mint-100','animate-pop');
    confetti();
    feedbackBox(true, 'أحسنت! إجابة صحيحة 🎉', 'أتقنت مهارة «'+s.name+'» بثقة!');
  } else {
    result[s.world].gaps[o.gap] = (result[s.world].gaps[o.gap]||0)+1;
    window.MB.recordDiag(GRADE, s.id, 'gap');
    buttons[i].classList.remove('border-grape-100'); buttons[i].classList.add('!border-coral-500','bg-coral-100','animate-shake');
    const ci = q.options.findIndex(function(x){return x.ok;});
    buttons[ci].classList.remove('border-grape-100'); buttons[ci].classList.add('!border-mint-400','bg-mint-50');
    feedbackBox(false, 'اكتشفنا شيئاً مهماً 💡', fx(o.why), o.gap);
  }
}

function feedbackBox(ok, title, body, gap){
  const last = qIdx===QUIZ.length-1;
  const btnLabel = last ? 'شاهد خريطتي 🗺️' : 'السؤال التالي ←';
  let box;
  if(ok){
    box = '<div class="animate-slideUp rounded-[2rem] bg-mint-100 border-4 border-mint-500 p-6 text-center">'+
      '<div class="text-4xl animate-bob">🌟</div>'+
      '<h3 class="font-display text-xl font-extrabold text-mint-700 mt-1">'+title+'</h3>'+
      '<p class="mt-1 text-grape-600 font-medium">'+body+'</p>'+
      '<button onclick="nextQ()" class="font-display mt-4 inline-flex items-center gap-2 px-8 py-3.5 rounded-2xl text-white text-lg font-extrabold bg-gradient-to-l from-mint-500 to-sky-500 btn-pop">'+btnLabel+'</button></div>';
  } else {
    box = '<div class="animate-slideUp rounded-[2rem] bg-white border-4 border-coral-300 p-6">'+
      '<div class="flex items-start gap-3"><span class="grid place-items-center w-12 h-12 rounded-2xl bg-coral-100 text-2xl shrink-0 animate-wobble">💡</span>'+
      '<div><h3 class="font-display text-lg font-extrabold text-coral-600">'+title+'</h3><p class="mt-1 text-grape-600 font-medium">'+body+'</p></div></div>'+
      '<div class="mt-3 rounded-2xl bg-sunny-100 p-3 flex items-center gap-2 text-sm"><span>🎯</span><span class="font-medium text-grape-700">الفجوة: <b>'+gap+'</b></span></div>'+
      '<button onclick="nextQ()" class="font-display mt-4 w-full inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-2xl text-white text-lg font-extrabold bg-gradient-to-l from-grape-500 to-bubble-500 btn-pop">'+btnLabel+'</button></div>';
  }
  document.getElementById('feedback').innerHTML = box;
  document.getElementById('feedback').scrollIntoView({behavior:'smooth',block:'center'});
}

function nextQ(){ if(qIdx < QUIZ.length-1){ qIdx++; screenQuestion(); } else { screenResult(); } }

/* ============ شاشة النتيجة والتوجيه ============ */
function screenResult(){
  document.getElementById('progBar').style.width='100%';
  document.getElementById('progress').classList.add('hidden');
  confetti(true);

  // نسبة كل عالم
  const worlds = Object.keys(result);
  const pct = {};
  worlds.forEach(function(w){ const r=result[w]; pct[w]= r.total? Math.round(r.correct/r.total*100):0; });

  // العالم الأضعف
  let weakest = worlds[0];
  worlds.forEach(function(w){ if(pct[w] < pct[weakest]) weakest = w; });

  // المهارة الأولى بالعلاج: أول مهارة متعثّرة في العالم الأضعف
  const weakSkills = QUIZ.filter(function(s){ return s.world===weakest; });
  let targetSkill = null;
  for(const s of weakSkills){ if((window.MB.load().skills[s.id]||{}).diag==='gap'){ targetSkill=s; break; } }
  if(!targetSkill) targetSkill = weakSkills[0];

  const w = window.WORLDS[weakest];
  const rescueLink = (targetSkill.richPage && targetSkill.richPage.length)
      ? targetSkill.richPage
      : 'rescue-skill.html?id='+targetSkill.id;

  function worldCard(wk){
    const wi = window.WORLDS[wk], p = pct[wk];
    const g = result[wk].gaps, gk = Object.keys(g);
    const gaps = gk.length
      ? gk.map(function(k){return '<li class="flex items-center gap-2"><span>🎯</span><span class="font-medium text-grape-600">'+k+'</span></li>';}).join('')
      : '<li class="flex items-center gap-2 text-mint-700 font-bold">✅ لا فجوات — رائع!</li>';
    return '<div class="rounded-[2rem] '+wi.soft+' border-4 border-white shadow-card p-5">'+
      '<div class="flex items-center justify-between">'+
        '<h3 class="font-display font-extrabold '+wi.text+'">'+wi.emoji+' '+wi.name+'</h3>'+
        '<span class="font-display font-bold '+wi.text+'">'+toAr(p)+'٪</span></div>'+
      '<div class="mt-2 h-3 rounded-full bg-white/70 overflow-hidden"><div class="h-full rounded-full '+wi.chip+'" style="width:'+p+'%"></div></div>'+
      '<ul class="mt-3 space-y-1.5 text-sm">'+gaps+'</ul></div>';
  }

  stage.innerHTML =
    '<div class="text-center animate-pop">'+
      '<div class="mx-auto w-28 h-28 grid place-items-center rounded-[2rem] bg-gradient-to-br from-grape-500 to-bubble-500 text-6xl shadow-bubbly animate-bob">🗺️</div>'+
      '<h1 class="font-display mt-5 text-3xl sm:text-4xl font-extrabold text-grape-700">خريطتك السحرية جاهزة!</h1>'+
      '<p class="mt-2 text-grape-500 font-medium">نتيجتك في عوالم الصف '+toAr(GRADE)+' 👇</p></div>'+
    '<div class="mt-6 grid sm:grid-cols-2 gap-4">'+ worlds.map(worldCard).join('') +'</div>'+
    '<div class="mt-6 rounded-[2rem] bg-gradient-to-br from-grape-600 to-bubble-500 text-white border-[6px] border-white shadow-bubbly p-7 text-center">'+
      '<div class="text-5xl animate-bob">'+w.emoji+'</div>'+
      '<h2 class="font-display text-2xl font-extrabold mt-2">نبدأ العلاج من '+w.name+'!</h2>'+
      '<p class="mt-2 text-white/90 font-medium">إنه عالمك الأضعف حالياً ('+toAr(pct[weakest])+'٪)، ونبدأ بمهارة «'+targetSkill.name+'». لنقوّيه أولاً! 💪</p>'+
      '<a href="'+rescueLink+'" class="font-display mt-5 inline-flex items-center gap-2 px-8 py-4 rounded-2xl text-grape-700 text-lg font-extrabold bg-white btn-pop">🚑 ابدأ مهمة الإنقاذ</a></div>'+
    '<div class="mt-6 flex flex-wrap gap-3 justify-center">'+
      '<button onclick="screenWelcome()" class="font-display inline-flex items-center gap-2 px-7 py-3.5 rounded-2xl text-grape-600 text-lg font-extrabold bg-white border-4 border-grape-100 btn-pop">🔁 إعادة الاختبار</button>'+
      '<a href="index.html" class="font-display inline-flex items-center gap-2 px-7 py-3.5 rounded-2xl text-grape-600 text-lg font-extrabold bg-white border-4 border-grape-100 btn-pop">🏝️ خريطة الجزيرة</a></div>'+
    '<p class="text-center mt-5 text-sm font-bold text-grape-400">إعداد المعلمة T. Wad Refae</p>';
  window.scrollTo({top:0,behavior:'smooth'});
}

screenWelcome();
</script>
</body>
</html>
